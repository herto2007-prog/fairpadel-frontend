<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Favicon que cambia según tema del sistema -->
    <link rel="icon" type="image/png" href="/logos/favicon-light.png" id="favicon" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="facebook-domain-verification" content="4rwpaxjrlzgv1svyzo8mxrajte6l34" />
    
    <!-- SEO Meta Tags -->
    <title>FairPadel - Plataforma #1 de Pádel en Paraguay</title>
    <meta name="description" content="FairPadel es la plataforma líder de pádel en Paraguay. Organiza torneos, reserva canchas y gestiona tu club de pádel en un solo lugar." />
    <meta name="keywords" content="padel, pádel, Paraguay, torneos de padel, reserva canchas, club de padel, fairpadel" />
    <meta name="author" content="FairPadel" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph Meta Tags (para Facebook, WhatsApp, etc.) -->
    <meta property="og:title" content="FairPadel - Plataforma #1 de Pádel en Paraguay" />
    <meta property="og:description" content="Organiza torneos, reserva canchas y gestiona tu club de pádel. La plataforma líder de pádel en Paraguay." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.fairpadel.com" />
    <meta property="og:image" content="https://www.fairpadel.com/logos/favicon-light.png" />
    <meta property="og:site_name" content="FairPadel" />
    <meta property="og:locale" content="es_PY" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FairPadel - Plataforma #1 de Pádel en Paraguay" />
    <meta name="twitter:description" content="Organiza torneos, reserva canchas y gestiona tu club de pádel en Paraguay." />
    <meta name="twitter:image" content="https://www.fairpadel.com/logos/favicon-light.png" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.fairpadel.com" />
    
    <!-- Script para cambiar favicon según tema -->
    <script>
      (function() {
        const favicon = document.getElementById('favicon');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
        
        function updateFavicon() {
          if (prefersDark.matches) {
            favicon.href = '/logos/favicon-dark.png';
          } else {
            favicon.href = '/logos/favicon-light.png';
          }
        }
        
        // Detectar cambio de tema
        prefersDark.addEventListener('change', updateFavicon);
        
        // Inicializar
        updateFavicon();
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
