version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fairpadel-db
    environment:
      POSTGRES_USER: fairpadel
      POSTGRES_PASSWORD: fairpadel_dev
      POSTGRES_DB: fairpadel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fairpadel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fairpadel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
